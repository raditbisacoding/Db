<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ikhwanul Store - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a00 40%, #ff6600 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .container { width: 100%; max-width: 450px; padding: 20px; animation: fadeInScale 0.6s ease-out; }
        .login-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(255,102,0,0.3);
            transition: all 0.3s ease;
        }
        .login-card:hover { border-color: #ff6600; box-shadow: 0 0 30px rgba(255,102,0,0.2); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 60px; color: #ff6600; animation: float 3s ease-in-out infinite; }
        .logo h1 { color: white; font-size: 28px; margin-top: 10px; }
        .logo h1 span { color: #ff6600; }
        .logo p { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 5px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #ff6600;
            font-size: 18px;
            z-index: 1;
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .input-group input:focus { outline: none; border-color: #ff6600; box-shadow: 0 0 10px rgba(255,102,0,0.3); }
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { padding-right: 50px; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #ff6600;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ff6600, #cc4400);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,102,0,0.4); }
        .error-msg { background: rgba(255,0,0,0.2); color: #ff6b6b; padding: 10px; border-radius: 10px; text-align: center; margin-top: 15px; display: none; }
        .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 12px; }
        .info-text { text-align: center; margin-top: 15px; color: rgba(255,255,255,0.5); font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-store"></i>
                <h1>Ikhwanul<span>STORE</span></h1>
                <p>License Management System</p>
            </div>
            <div class="input-group password-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="passwordInput" placeholder="Masukkan Password">
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="fas fa-eye-slash" id="toggleIcon"></i>
                </button>
            </div>
            <button class="btn-login" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="info-text"><i class="fas fa-shield-alt"></i> Secure System | Auto Logout 30 Menit</div>
            <div class="footer">© 2026 Ikhwanulstore</div>
        </div>
    </div>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                pwd.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
        
        async function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!password) {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = 'Masukkan password!';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            try {
                errorMsg.style.display = 'none';
                
                const response = await fetch('https://epin-3b848-default-rtdb.asia-southeast1.firebasedatabase.app/epin_passwords.json');
                const passwords = await response.json() || {
                    developer: 'radit123',
                    owner: 'ikhwanul',
                    super_reseller: 'wawakinul',
                    reseller: 'ikhwanulreseller'
                };
                
                let role = null;
                let name = null;
                
                if (password === passwords.developer) { role = 'developer'; name = 'Master Developer'; }
                else if (password === passwords.owner) { role = 'owner'; name = 'Ikhwanul Store Owner'; }
                else if (password === passwords.super_reseller) { role = 'super_reseller'; name = 'Super Reseller'; }
                else if (password === passwords.reseller) { role = 'reseller'; name = 'Reseller'; }
                
                if (role) {
                    const hash = Math.random().toString(36).substring(2, 15);
                    const session = { role, name, hash, expires: Date.now() + 30 * 60 * 1000 };
                    localStorage.setItem('epin_session', JSON.stringify(session));
                    
                    let dashboard = '';
                    if (role === 'developer') dashboard = `developer.html?hash=${hash}`;
                    else if (role === 'owner') dashboard = `owner.html?hash=${hash}`;
                    else if (role === 'super_reseller') dashboard = `superreseller.html?hash=${hash}`;
                    else dashboard = `reseller.html?hash=${hash}`;
                    window.location.href = dashboard;
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerHTML = 'Password salah!';
                    setTimeout(() => errorMsg.style.display = 'none', 3000);
                    document.querySelector('.login-card').style.animation = 'shake 0.5s ease-in-out';
                    setTimeout(() => document.querySelector('.login-card').style.animation = '', 500);
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '⚠️ Gagal terhubung ke server!';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        }
        
        document.getElementById('passwordInput').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
        
        const session = localStorage.getItem('epin_session');
        if (session) {
            try {
                const parsed = JSON.parse(session);
                if (parsed.expires > Date.now()) {
                    let dashboard = '';
                    if (parsed.role === 'developer') dashboard = `developer.html?hash=${parsed.hash}`;
                    else if (parsed.role === 'owner') dashboard = `owner.html?hash=${parsed.hash}`;
                    else if (parsed.role === 'super_reseller') dashboard = `superreseller.html?hash=${parsed.hash}`;
                    else dashboard = `reseller.html?hash=${parsed.hash}`;
                    window.location.href = dashboard;
                } else { localStorage.removeItem('epin_session'); }
            } catch(e) {}
        }
    </script>
</body>
</html>
