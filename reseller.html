<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EpinStoreOffc - Reseller Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-store"></i>
            <h3>Reseller Epin</h3>
            <p>epin store | <i class="fab fa-telegram"></i> @epineek</p>
        </div>
        <div class="sidebar-menu">
            <a href="#" class="active" onclick="showPage('dashboard'); return false;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="#" onclick="showPage('add'); return false;"><i class="fas fa-plus-circle"></i> Add Number</a>
            <a href="#" onclick="showPage('password'); return false;"><i class="fas fa-key"></i> Change Password</a>
            <a href="#" onclick="showPage('chat'); return false;"><i class="fas fa-comments"></i> Global Chat</a>
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
    <div class="container">
        <div class="navbar">
            <div><button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button></div>
            <div class="logo"><h2>EPINSTORE<span>OFFC</span></h2><span>Reseller Dashboard</span></div>
            <div class="user-info"></div>
        </div>
        <div id="dashboardPage" class="page-content">
            <div class="role-title" style="text-align:center; margin-bottom:20px; color:#ff884d;"></div>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-database"></i><div><h3>📊 Total Numbers</h3><p id="totalNumbers">0</p></div></div>
                <div class="stat-card"><i class="fas fa-chart-line"></i><div><h3>📈 My Performance</h3><p id="myPerformance">0</p></div></div>
            </div>
        </div>
        <div id="addPage" class="page-content" style="display:none;">
            <div class="card"><h2><i class="fas fa-plus-circle"></i> Add Number</h2>
                <form id="addForm"><input type="text" id="phoneNumber" placeholder="628123456789" required style="font-weight:bold;"><button type="submit">Add Number</button></form>
                <div id="addResult" style="margin-top:15px; color:#ff884d;"></div>
            </div>
        </div>
        <div id="passwordPage" class="page-content" style="display:none;">
            <div class="card">
                <h2><i class="fas fa-key"></i> Change Password</h2>
                <form id="passwordForm">
                    <div class="password-wrapper"><input type="password" id="oldPassword" placeholder="Password Lama"><button type="button" class="toggle-password" onclick="toggleOldPassword()"><i class="fas fa-eye-slash" id="oldToggleIcon"></i></button></div>
                    <div class="password-wrapper"><input type="password" id="newPassword" placeholder="Password Baru"><button type="button" class="toggle-password" onclick="toggleNewPassword()"><i class="fas fa-eye-slash" id="newToggleIcon"></i></button></div>
                    <div class="password-wrapper"><input type="password" id="confirmPassword" placeholder="Konfirmasi Password Baru"><button type="button" class="toggle-password" onclick="toggleConfirmPassword()"><i class="fas fa-eye-slash" id="confirmToggleIcon"></i></button></div>
                    <button type="submit">Update Password</button>
                </form>
                <div id="passwordResult" style="margin-top:15px; color:#ff884d;"></div>
            </div>
        </div>
        <div id="chatPage" class="page-content" style="display:none;">
            <div class="card"><h2><i class="fas fa-globe"></i> Global Chat Room</h2>
                <div class="chat-container" id="chatMessages"></div>
                <form id="chatForm"><textarea id="chatMessage" rows="2" placeholder="Type your message..."></textarea><button type="submit">Send</button></form>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        const FIREBASE_URL = 'https://epin-3b848-default-rtdb.asia-southeast1.firebasedatabase.app/';
        if (!validatePageAccess('reseller')) window.location.href = 'index.html';
        
        function toggleOldPassword() { const pwd = document.getElementById('oldPassword'); const icon = document.getElementById('oldToggleIcon'); if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } else { pwd.type = 'password'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } }
        function toggleNewPassword() { const pwd = document.getElementById('newPassword'); const icon = document.getElementById('newToggleIcon'); if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } else { pwd.type = 'password'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } }
        function toggleConfirmPassword() { const pwd = document.getElementById('confirmPassword'); const icon = document.getElementById('confirmToggleIcon'); if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } else { pwd.type = 'password'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } }
        
        async function fetchData(url) { try { const res = await fetch(url); return await res.json(); } catch(e) { return null; } }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.sidebar-overlay').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.querySelector('.sidebar-overlay').classList.remove('active'); }
        
        function showPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
            document.getElementById(page + 'Page').style.display = 'block';
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active'); closeSidebar();
            if (page === 'chat') loadChat();
        }
        
        async function loadStats() {
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const total = Array.isArray(numbers) ? numbers.length : 0;
            document.getElementById('totalNumbers').innerText = total;
            document.getElementById('myPerformance').innerText = total;
        }
        
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const phone = document.getElementById('phoneNumber').value;
            if (!phone.match(/^62\d{8,13}$/)) { showToast('❌ Format nomor salah!', 'error'); return; }
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const current = Array.isArray(numbers) ? numbers : [];
            if (current.includes(phone)) { showToast(`⚠️ Nomor ${phone} sudah terdaftar!`, 'warning'); return; }
            current.push(phone);
            await fetch(FIREBASE_URL + 'epin_active_numbers.json', { method: 'PUT', body: JSON.stringify(current), headers: { 'Content-Type': 'application/json' } });
            showToast(`✅ Nomor ${phone} berhasil ditambahkan!`, 'success');
            document.getElementById('phoneNumber').value = ''; loadStats();
        });
        
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (!oldPassword || !newPassword || !confirmPassword) { showToast('❌ Semua field harus diisi!', 'error'); return; }
            if (newPassword !== confirmPassword) { showToast('❌ Password baru tidak cocok!', 'error'); return; }
            const session = JSON.parse(localStorage.getItem('epin_session'));
            const role = session.role;
            try {
                const response = await fetch('https://epin-database.vercel.app/api/change-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, oldPassword, newPassword })
                });
                const result = await response.json();
                if (result.success) { showToast(`✅ ${result.message}`, 'success'); document.getElementById('passwordForm').reset(); }
                else { showToast(`❌ ${result.message}`, 'error'); }
            } catch (err) { showToast('❌ Gagal mengubah password!', 'error'); }
        });
        
        async function loadChat() {
            const messages = await fetchData(FIREBASE_URL + 'epin_chat_messages.json');
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) { container.innerHTML = '<p style="color:white; text-align:center;">Belum ada pesan</p>'; return; }
            container.innerHTML = messages.map(msg => `<div class="chat-message"><strong><i class="fas fa-user"></i> ${msg.username}</strong> <small>${msg.time}</small><p>${msg.message}</p></div>`).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const message = document.getElementById('chatMessage').value.trim(); if (!message) return;
            const session = JSON.parse(localStorage.getItem('epin_session'));
            const now = new Date();
            const messages = await fetchData(FIREBASE_URL + 'epin_chat_messages.json') || [];
            messages.push({ username: session.role, role: session.role, message, time: now.toLocaleTimeString('id-ID'), date: now.toLocaleDateString('id-ID'), timestamp: Date.now() });
            if (messages.length > 100) messages.shift();
            await fetch(FIREBASE_URL + 'epin_chat_messages.json', { method: 'PUT', body: JSON.stringify(messages), headers: { 'Content-Type': 'application/json' } });
            document.getElementById('chatMessage').value = ''; loadChat();
        });
        
        loadStats(); setInterval(loadStats, 10000); setInterval(loadChat, 5000);
    </script>
</body>
</html>
